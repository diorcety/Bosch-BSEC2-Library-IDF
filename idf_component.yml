description: Bosch Sensortec Environmental Cluster (BSEC) Software library for use
  with the BME68x has been conceptualized to provide higher-level signal processing
  and fusion for the BME68x. The library receives compensated sensor values from the
  sensor API. It processes the BME68x signals to provide the requested sensor outputs.
version: 1.10.2610
repository: https://github.com/boschsensortec/Bosch-BSEC2-Library
dependencies:
  boschsensortec/Bosch-BME68x-Library:
    git: https://github.com/esphome-libs/Bosch-BME68x-Library.git
    version: v1.3.40408
